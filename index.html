<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAGGAER Elevator</title>
  <style>
    :root {
      --p50:#eeedfe; --p100:#cecaf6; --p600:#5449b9; --p800:#3b347f;
      --bg:#ffffff; --bg2:#f8f7f4; --bg3:#f0eee9;
      --tx:#1e1d19; --tx2:#615f58; --tx3:#9b978d;
      --bd:rgba(0,0,0,0.1); --bd2:rgba(0,0,0,0.18);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg2); color:var(--tx); }
    .nav { background:var(--bg); border-bottom:0.5px solid var(--bd2); padding:0 24px; display:flex; align-items:stretch; }
    .nav-brand { display:flex; align-items:center; gap:10px; padding:14px 20px 14px 0; border-right:0.5px solid var(--bd); margin-right:8px; }
    .nav-brand-mark { width:28px; height:28px; border-radius:8px; background:var(--p600); color:#fff; display:grid; place-items:center; font-size:12px; font-weight:700; }
    .nav-brand strong { display:block; font-size:13px; }
    .nav-brand span { display:block; font-size:11px; color:var(--tx2); }
    .nav-links { display:flex; align-items:stretch; overflow-x:auto; }
    .nav-link { display:flex; align-items:center; padding:0 14px; font-size:13px; color:var(--tx2); border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap; min-height:56px; background:none; border-top:none; border-left:none; border-right:none; }
    .nav-link.active, .nav-link:hover { color:var(--p600); border-bottom-color:var(--p600); font-weight:600; }
    .toolbar { max-width:1100px; margin:0 auto; padding:14px 24px 0; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .toolbar label { font-size:12px; color:var(--tx2); }
    .toolbar input { font-size:12px; }
    .site-note { max-width:1100px; margin:0 auto; padding:8px 24px 0; font-size:12px; color:var(--tx2); }
    .page { display:none; max-width:1100px; margin:0 auto; padding:28px 24px 40px; }
    .page.active { display:block; }
    .page-header { margin-bottom:24px; }
    .breadcrumb { font-size:11px; color:var(--tx3); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
    .page-header h1 { font-size:22px; font-weight:700; letter-spacing:-0.03em; }
    .page-header p { font-size:13px; color:var(--tx2); margin-top:5px; line-height:1.5; max-width:82ch; }
    .stack { display:grid; gap:16px; }
    .grid-2, .grid-3, .grid-4 { display:grid; gap:16px; }
    .grid-2 { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .grid-3 { grid-template-columns:repeat(3,minmax(0,1fr)); }
    .grid-4 { grid-template-columns:repeat(4,minmax(0,1fr)); }
    .card, .metric-card, .table-card, .media-card { background:var(--bg); border:0.5px solid var(--bd); border-radius:12px; }
    .card, .table-card, .media-card { padding:18px; }
    .metric-card { background:var(--bg3); padding:16px; text-align:center; }
    .badge { display:inline-block; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; padding:3px 8px; border-radius:5px; background:var(--p100); color:var(--p800); }
    .metric-value { font-size:36px; font-weight:700; line-height:1; letter-spacing:-0.03em; }
    .metric-label { font-size:11px; color:var(--tx2); margin-top:6px; text-transform:uppercase; letter-spacing:0.06em; }
    .card h3, .media-card h3, .table-card h3 { font-size:14px; font-weight:700; color:var(--tx); margin-top:10px; }
    .card p, .table-card p, .media-card p { font-size:12px; color:var(--tx2); line-height:1.5; margin-top:6px; }
    .table-card table { width:100%; border-collapse:collapse; margin-top:12px; font-size:13px; }
    .table-card th { font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:var(--tx3); text-align:left; padding:8px 12px; border-bottom:0.5px solid var(--bd2); }
    .table-card td { padding:9px 12px; border-bottom:0.5px solid var(--bd); vertical-align:top; }
    .table-card tr:last-child td { border-bottom:none; }
    .media-placeholder, .media-slot img, .media-slot video, .media-slot iframe { width:100%; min-height:240px; border-radius:10px; border:0.5px solid var(--bd); background:var(--bg3); }
    .media-placeholder { display:flex; align-items:center; justify-content:center; color:var(--tx3); font-size:12px; text-align:center; padding:24px; }
    @media (max-width:860px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns:1fr; }
      .page, .toolbar, .site-note { padding-left:16px; padding-right:16px; }
      .nav { padding:0 12px; }
    }
  </style>
</head>

overview,card,card,1,Foundation,Customer RAG per customer,"At the center of the proposal is a customer-specific RAG. It stores and retrieves the real customer story: how implementation went, why the customer is configured a certain way, what pain points emerged, what compliance challenges matter, what was recommended before, and what internal teams have learned over time.",,,,,,,,,

overview,card,card,3,Playbook Engine,Signals turned into action,"Elevator uses JAGGAER playbooks and signal patterns to decide what should happen next. Instead of leaving expansion timing, renewal preparation, and adoption recovery to guesswork, the system helps teams move earlier and with more confidence.",,,,,,,,,
overview,card,card,4,Practical Outcome,Built from what is already in front of us,"This is intentionally practical. The proposal does not depend on a fictional future platform. It is built from data and interactions that already exist across JAGGAER systems and can be organized into a smarter customer operating layer.",,,,,,,,,

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"') {
          if (inQuotes && next === '"') {
            value += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(value);
          value = "";
          if (row.some((cell) => cell !== "")) rows.push(row);
          row = [];
        } else {
          value += char;
        }
      }
      if (value.length || row.length) {
        row.push(value);
        rows.push(row);
      }
      const [headers, ...dataRows] = rows;
      return dataRows.map((dataRow) => {
        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = dataRow[index] || "";
        });
        obj.sort = Number(obj.sort || 0);
        return obj;
      });
    }

    function badgeMarkup(text) {
      return text ? `<span class="badge">${text}</span>` : "";
    }

    function renderMedia(item) {
      const title = item.title || "Media slot";
      const body = item.body || "";
      const caption = item.media_caption || "";
      let mediaHtml = `<div class="media-placeholder">No media URL yet. Add a URL in the content sheet to populate this slot.</div>`;
      if (item.media_url) {
        if (item.media_type === "image") {
          mediaHtml = `<div class="media-slot"><img src="${item.media_url}" alt="${title}"></div>`;
        } else if (item.media_type === "video") {
          mediaHtml = `<div class="media-slot"><video controls preload="metadata" src="${item.media_url}"></video></div>`;
        } else if (item.media_type === "embed") {
          mediaHtml = `<div class="media-slot"><iframe src="${item.media_url}" title="${title}" frameborder="0" allowfullscreen></iframe></div>`;
        }
      }
      return `
        <section class="media-card">
          ${badgeMarkup(item.badge)}
          <h3>${title}</h3>
          <p>${body}</p>
          ${mediaHtml}
          ${caption ? `<p>${caption}</p>` : ""}
        </section>
      `;
    }

    function tableTitle(page) {
      if (page === "outputs") return "Outputs Summary";
      if (page === "details") return "Source Summary";
      if (page === "impact") return "Business Impact Table";
      return "Table";
    }

    function renderPage(page, items) {
      const hero = items.find((item) => item.kind === "hero");
      const metrics = items.filter((item) => item.kind === "metric").sort((a, b) => a.sort - b.sort);
      const cards = items.filter((item) => item.kind === "card").sort((a, b) => a.sort - b.sort);
      const tableRows = items.filter((item) => item.kind === "table_row").sort((a, b) => a.sort - b.sort);
      const media = items.filter((item) => item.kind === "media").sort((a, b) => a.sort - b.sort);
      const target = document.getElementById(`page-${page}`);
      if (!target || !hero) return;

      const tableHtml = tableRows.length ? `
        <section class="table-card">
          <h3>${tableTitle(page)}</h3>
          <table>
            <thead>
              <tr>
                <th>${tableRows[0].col1 || ""}</th>
                <th>${tableRows[0].col2 || ""}</th>
                <th>${tableRows[0].col3 || ""}</th>
                <th>${tableRows[0].col4 || ""}</th>
              </tr>
            </thead>
            <tbody>
              ${tableRows.slice(1).map((row) => `
                <tr>
                  <td>${row.col1 || ""}</td>
                  <td>${row.col2 || ""}</td>
                  <td>${row.col3 || ""}</td>
                  <td>${row.col4 || ""}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </section>
      ` : "";

      target.innerHTML = `
        <header class="page-header">
          <div class="breadcrumb">${page}</div>
          <h1>${hero.title}</h1>
          <p>${hero.body}</p>
        </header>
        <section class="stack">
          ${metrics.length ? `
            <div class="grid-4">
              ${metrics.map((metric) => `
                <div class="metric-card">
                  <div class="metric-value">${metric.value}</div>
                  <div class="metric-label">${metric.body || metric.note || ""}</div>
                </div>
              `).join("")}
            </div>
          ` : ""}
          ${cards.length ? `
            <div class="${cards.length >= 4 ? "grid-2" : "grid-3"}">
              ${cards.map((card) => `
                <article class="card">
                  ${badgeMarkup(card.badge)}
                  <h3>${card.title}</h3>
                  <p>${card.body}</p>
                </article>
              `).join("")}
            </div>
          ` : ""}
          ${tableHtml}
          ${media.map(renderMedia).join("")}
        </section>
      `;
    }

    function renderAll(items) {
      pages.forEach((page) => renderPage(page, items.filter((item) => item.page === page)));
    }

    async function loadDefaultCsv() {
      renderAll(parseCsv(embeddedCsv));
      try {
        const response = await fetch("content.csv");
        if (!response.ok) return;
        const text = await response.text();
        renderAll(parseCsv(text));
      } catch (error) {
        // file:// fallback uses embedded CSV
      }
    }

    document.querySelectorAll(".nav-link").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".nav-link").forEach((link) => link.classList.remove("active"));
        document.querySelectorAll(".page").forEach((page) => page.classList.remove("active"));
        button.classList.add("active");
        document.getElementById(`page-${button.dataset.page}`).classList.add("active");
      });
    });

    document.getElementById("csv-upload").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      renderAll(parseCsv(text));
    });

    loadDefaultCsv();
  </script>
</body>
</html>
